<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Kak Rinaa 🎂</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Poppins,system-ui;
  background:linear-gradient(135deg,#ff9a9e,#fad0c4);
  color:#fff;
  height:100vh;
}

.center{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;
}

.hidden{display:none}

button{
  padding:12px 24px;
  border:none;
  border-radius:999px;
  font-size:18px;
  background:#fff;
  color:#ff6f91;
  font-weight:600;
  cursor: pointer;
  transition: transform 0.2s;
}
button:active{transform: scale(0.95)}

img{
  max-width:100%;
  border-radius:16px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

/* typing */
.typing{
  font-size:32px;
  font-weight:700;
  white-space:nowrap;
  overflow:hidden;
  border-right:3px solid #fff;
  animation:blink .8s infinite;
}
@keyframes blink{50%{border-color:transparent}}

/* cake */
.cake-box{
  position:relative;
  width:150px;
  margin:auto;
}
.cake-body{
  width:150px;
  height:90px;
  background:#693b3b;
  border-radius:0 0 24px 24px;
}
.candle{
  position:absolute;
  top:-35px;
  left:50%;
  transform:translateX(-50%);
  width:12px;
  height:35px;
  background:white;
  border-radius:6px;
}
#flame{
  position:absolute;
  top:-18px;
  left:50%;
  transform:translateX(-50%);
  width:16px;
  height:16px;
  background:orange;
  border-radius:50%;
  animation:flicker .7s infinite;
}
@keyframes flicker{
  0%{transform:translateX(-50%) scale(1)}
  50%{transform:translateX(-50%) scale(1.3)}
  100%{transform:translateX(-50%) scale(1)}
}
.fade{
  animation:bye .8s forwards;
}
@keyframes bye{
  to{opacity:0; transform:translateX(-50%) scale(0)}
}

/* gift */
.gift{
  font-size:90px;
  animation:shake 1.5s infinite;
  cursor: pointer;
}
@keyframes shake{
  0%,100%{transform:rotate(0)}
  25%{transform:rotate(5deg)}
  75%{transform:rotate(-5deg)}
}

/* card */
.card{
  background:rgba(255,255,255,.15);
  backdrop-filter:blur(10px);
  padding:20px;
  border-radius:20px;
  border: 1px solid rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<!-- AUDIO -->
<audio id="song" src="lagu.mp3" loop></audio>

<!-- STEP 1 -->
<div class="center" id="step1">
  <button onclick="go(2)">tap mee 💌</button>
</div>

<!-- STEP 2 -->
<div class="center hidden" id="step2">
  <div>
    <div id="typing" class="typing"></div>
    <br><br>
    <img src="WA_1772581835379.jpeg" alt="Foto Rinaa">
    <p style="font-size:20px">💓 بارك الله فى امرك</p>
    <br>
    <button onclick="go(3)">next 👉🏻</button>
  </div>
</div>
