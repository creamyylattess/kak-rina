<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎂</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui;
  background:linear-gradient(135deg,#ff9a9e,#fad0c4);
  color:#fff;
  height:100vh;
}

.center{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.hidden{display:none}

button{
  padding:12px 24px;
  border:none;
  border-radius:999px;
  font-size:18px;
  background:#fff;
  color:#ff6f91;
  font-weight:600;
  cursor:pointer;
}

/* ===== CAKE ===== */
.cake-box{
  width:150px;
  margin:auto;
}

.cake-body{
  position:relative;
  width:150px;
  height:90px;
  background:#693b3b;
  border-radius:0 0 24px 24px;
}

.candle {
  position: absolute;
  top: -35px; /* Posisi tepat di atas kue */
  left: 50%;
  transform: translateX(-50%);
  width: 12px;
  height: 35px;
  background: repeating-linear-gradient(45deg, #fff, #fff 4px, #ff6f91 4px, #ff6f91 8px);
  border-radius: 4px;
  z-index: 3;
}

/* Api Lilin */
.flame {
  position: absolute;
  top: -20px;
  left: 50%;
  transform: translateX(-50%);
  width: 14px;
  height: 22px;
  background: radial-gradient(ellipse at bottom, #ffeb3b 0%, #ff9800 60%, #ff5722 100%);
  border-radius: 50% 50% 20% 20%;
  box-shadow: 0 0 10px #ffeb3b, 0 0 20px #ff9800;
  animation: flicker 0.5s infinite alternate;
  transform-origin: bottom center;
  z-index: 4;
}

/* Animasi Api Mati */
.flame.out {
  animation: extinguish 0.5s forwards;
}

@keyframes flicker{
  from{transform:translateX(-50%) scale(1)}
  to{transform:translateX(-50%) scale(1.3)}
}

.fade{
  animation:out .6s forwards;
}
@keyframes out{
  to{opacity:0; transform:translateX(-50%) scale(0)}
}
</style>
</head>

<body>

<div class="center" id="step1">
  <button onclick="go(2)">tap mee 💌</button>
</div>

<div class="center hidden" id="step2">
  <div>
    <div class="cake-box">
      <div class="cake-body">
        <div class="candle">
          <div class="flame" id="flame"></div>
        </div>
      </div>
    </div>
    <br>
    <button id="btn" onclick="blow()">tiup lilin 💨</button>
  </div>
</div>

<script>
function go(n){
  document.querySelectorAll('.center')
    .forEach(e=>e.classList.add('hidden'));
  document.getElementById('step'+n).classList.remove('hidden');
}

function blow(){
  document.getElementById('flame').classList.add('fade');
  document.getElementById('btn').disabled=true;
}
</script>

</body>
</html>
