<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Kak Rinaa 🎂</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Poppins,system-ui;
  background:linear-gradient(135deg,#ff9a9e,#fad0c4);
  color:#fff;
  height:100vh;
  overflow: hidden;
}

.center{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;
}

.hidden{display:none}

button{
  padding:12px 24px;
  border:none;
  border-radius:999px;
  font-size:18px;
  background:#fff;
  color:#ff6f91;
  font-weight:600;
  cursor: pointer;
  transition: transform 0.2s, opacity 0.3s;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
button:active{transform: scale(0.95)}
button:disabled{opacity: 0.5; cursor: not-allowed}

img{
  max-width:100%;
  border-radius:16px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.15);
}

/* typing */
.typing{
  font-size:28px;
  font-weight:700;
  white-space:nowrap;
  overflow:hidden;
  border-right:3px solid #fff;
  animation:blink .8s infinite;
  min-height: 40px;
}
@keyframes blink{50%{border-color:transparent}}

/* --- CAKE DESIGN (FIXED) --- */
.cake-container {
  position: relative;
  width: 200px;
  height: 160px;
  margin: 0 auto 30px auto;
}

/* Badan Kue */
.cake-body {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 160px;
  height: 90px;
  background: #5d4037; /* Warna coklat kue */
  border-radius: 10px 10px 20px 20px;
  box-shadow: inset 0 -10px 0 rgba(0,0,0,0.2);
  z-index: 1;
}

/* Lapisan Kue (Efek 3D) */
.cake-body::before {
  content: '';
  position: absolute;
  top: -15px;
  left: 0;
  width: 100%;
  height: 20px;
  background: #e3d7cf; /* Warna krim */
  border-radius: 10px 10px 0 0;
  box-shadow: 0 5px 0 #d7ccc8;
}

/* Krim Menetes */
.cake-body::after {
  content: '';
  position: absolute;
  top: -15px;
  left: 10px;
  width: 140px;
  height: 30px;
  background: #e3d7cf;
  border-radius: 10px;
  box-shadow: 
    10px 15px 0 #e3d7cf,
    10px 15px 0 #e3d7cf,
    10px 15px 0 #e3d7cf,
  z-index: 2;
}

/* Lilin */
.candle{
  position:absolute;
  top:-35px;
  left:50%;
  transform:translateX(-50%);
  width:12px;
  height:35px;
  background: repeating-linear-gradient(45deg, #fff, #fff 4px, #ff6f91 4px, #ff6f91 8px);
  border-radius: 4px;
  z-index: 3;
}

/* Api Lilin */
.flame {
  position: absolute;
  top: -20px;
  left: 50%;
  transform: translateX(-50%);
  width: 14px;
  height: 22px;
  background: radial-gradient(ellipse at bottom, #ffeb3b 0%, #ff9800 60%, #ff5722 100%);
  border-radius: 50% 50% 20% 20%;
  box-shadow: 0 0 10px #ffeb3b, 0 0 20px #ff9800;
  animation: flicker 0.5s infinite alternate;
  transform-origin: bottom center;
  z-index: 4;
}

/* Animasi Api Mati */
.flame.out {
  animation: extinguish 0.5s forwards;
}

@keyframes flicker {
  0% { transform: translateX(-50%) scale(1); opacity: 1; }
  100% { transform: translateX(-50%) scale(1.1); opacity: 0.8; }
}

@keyframes extinguish {
  0% { transform: translateX(-50%) scale(1); opacity: 1; }
  50% { transform: translateX(-50%) scale(1.5) rotate(10deg); opacity: 0.5; }
  100% { transform: translateX(-50%) scale(0); opacity: 0; }
}

/* Hiasan Kue */
.sprinkles {
  position: absolute;
  top: -10px;
  left: 50%;
  transform: translateX(-50%);
  width: 140px;
  height: 10px;
  background: transparent;
  z-index: 3;
}
.sprinkle {
  position: absolute;
  width: 6px;
  height: 6px;
  border-radius: 50%;
}

/* --- CARD & GIFT --- */
.card{
  background:rgba(255,255,255,.2);
  backdrop-filter:blur(10px);
  padding:30px;
  border-radius:24px;
  border: 1px solid rgba(255,255,255,0.3);
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.gift{
  font-size:100px;
  animation: shake 1.5s infinite;
  cursor: pointer;
  display: inline-block;
}
@keyframes shake{
  0%,100%{transform:rotate(0)}
  25%{transform:rotate(5deg)}
  75%{transform:rotate(-5deg)}
}
</style>
</head>

<body>

<!-- AUDIO -->
<audio id="song" src="lagu.mp3" loop></audio>

<!-- STEP 1 -->
<div class="center" id="step1">
  <button onclick="go(2)">tap mee 💌</button>
</div>

<!-- STEP 2 -->
<div class="center hidden" id="step2">
  <div>
    <div id="typing" class="typing"></div>
    <br><br>
    <img src="WA_1772581835379.jpeg" alt="Foto Rinaa">
    <p style="font-size:20px; margin-top:15px;">💓 بارك الله فى امرك</p>
    <br>
    <button onclick="go(3)">next 👉🏻</button>
  </div>
</div>

<!-- STEP 3 -->
<div class="center hidden" id="step3">
  <div>
    <div class="cake-container">
      <div class="candle">
        <div id="flame" class="flame"></div>
      </div>
      <div class="cake-body"></div>
      <!-- Hiasan kecil di atas kue -->
      <div class="sprinkles">
        <div class="sprinkle" style="top:0; left:10px; background:#ffeb3b"></div>
        <div class="sprinkle" style="top:0; left:30px; background:#ff9800"></div>
        <div class="sprinkle" style="top:0; left:50px; background:#f44336"></div>
        <div class="sprinkle" style="top:0; left:70px; background:#2196f3"></div>
        <div class="sprinkle" style="top:0; left:90px; background:#4caf50"></div>
        <div class="sprinkle" style="top:0; left:110px; background:#9c27b0"></div>
        <div class="sprinkle" style="top:0; left:130px; background:#ffeb3b"></div>
      </div>
    </div>
    <br>
    <button id="btn-blow" onclick="blow()">tiup lilin 💨</button>
  </div>
</div>

<!-- STEP 4 -->
<div class="center hidden" id="step4">
  <div>
    <h1>26 🎉</h1>
    <p>04 March 2000</p>
    <button onclick="go(5)">lanjut 👉</button>
  </div>
</div>

<!-- STEP 5 -->
<div class="center hidden" id="step5">
  <div>
    <p>click the gift 🎁</p>
    <div class="gift" onclick="go(6)">🎁</div>
  </div>
</div>

<!-- STEP 6 -->
<div class="center hidden" id="step6">
  <div class="card">
    <h2>💌</h2>
    <p>
      happy birthday to youu 🤍<br>
      semoga sehat, bahagia, cepat kaya.<br>
      nanti raya thr ke dekti yang banyak yerr 😚🫰🏻
    </p>
  </div>
</div>

<script>
// Variabel global untuk menyimpan interval typing
let typingInterval = null;

function go(n){
  // 1. Hapus semua animasi typing jika pindah halaman
  if(typingInterval) clearInterval(typingInterval);

  document.querySelectorAll('.center').forEach(e=>e.classList.add('hidden'));
  document.getElementById('step'+n).classList.remove('hidden');

  if(n===2){
    // 2. Coba putar lagu
    const song = document.getElementById('song');
    if(song) {
        song.play().then(() => {
            console.log("Music playing");
        }).catch(error => {
            console.log("Audio play failed (check file path):", error);
            alert("Pastikan file 'lagu.mp3' ada di folder yang sama!");
        });
    }
    typeText("Happy birthdayy 🎉");
  }
}

function typeText(text){
  let i=0;
  let el=document.getElementById("typing");
  
  if(!el) return;

  el.innerHTML="";
  
  if(typingInterval) clearInterval(typingInterval);

  typingInterval = setInterval(()=>{
    if(!el) { clearInterval(typingInterval); return; }
    
    el.innerHTML+=text[i];
    i++;
    if(i>=text.length) clearInterval(typingInterval);
  },120);
}

function blow(){
  const flame = document.getElementById("flame");
  const btn = document.getElementById("btn-blow");

  // Mencegah klik ganda
  if(flame.classList.contains("out")) return;

  // Matikan api
  flame.classList.add("out");
  
  // Ubah tombol
  btn.innerHTML = "Selesai ✨";
  btn.disabled = true;

  // Lanjut halaman setelah animasi
  setTimeout(()=>go(4), 1000);
}
</script>

</body>
</html>
